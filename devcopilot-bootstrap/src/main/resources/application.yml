server:
  port: 18080

spring:
  application:
    name: devcopilot-platform
  datasource:
    url: jdbc:mysql://localhost:13306/devcopilot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: devcopilot
    password: devcopilot
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Shanghai
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: localhost
    port: 15673
    username: devcopilot
    password: devcopilot
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
      repositories:
        enabled: false
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 35MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

devcopilot:
  jwt:
    secret: devcopilot-demo-secret-change-me-please-32chars
    expiration-seconds: 86400
  storage:
    root: data/uploads
  vector:
    enabled: true
    url: jdbc:postgresql://localhost:15432/devcopilot_vector
    username: devcopilot
    password: devcopilot
